# fail2ban filter: chong do key qua /api/check-key
# Bat IP goi /api/check-key qua nhieu (bo sung cho rate-limit noi bo cua keycheck).
#
# Dat file nay tai: /etc/fail2ban/filter.d/kiro-checkkey.conf
[Definition]
# Khop moi request toi /api/check-key (bat ke status) - jail se dem tan suat.
failregex = ^<HOST> .*"(POST|GET) /api/check-key.*"
ignoreregex =
