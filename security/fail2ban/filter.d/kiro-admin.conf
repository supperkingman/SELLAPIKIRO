# fail2ban filter: chong brute-force dang nhap admin Kiro-Go
# Bat cac request POST /admin/api/login tra ve 401 (sai mat khau) trong access log OLS.
#
# Dat file nay tai: /etc/fail2ban/filter.d/kiro-admin.conf
[Definition]
# Khop dong log co IP dau dong, request POST toi /admin/api/login, status 401.
# Ho tro ca dinh dang combined log cua OpenLiteSpeed.
failregex = ^<HOST> .*"(POST|GET) /admin/api/login.*" 401
            ^<HOST> .*"(POST|GET) /admin/login.*" 401
ignoreregex =
